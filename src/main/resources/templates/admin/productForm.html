<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/base :: masterLayout(~{::title}, ~{}, ~{::.content}, ~{::.customJs})}">
<head>
    <title>Formulario producto</title>

    <th:block class="customCss">

    </th:block>
</head>
<body>

<div class="content">
    <section class="container my-5">
        <form th:action="${product.id == null} ? @{/admin/products} : @{/admin/products/{id}(id=${product.id})}"
              th:method="${product.id == null} ? 'post' : 'put'"
              th:object="${product}">

            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="fw-bold">Nombre</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="d-flex flex-row gap-3">
                <div class="col mb-3">
                    <label for="categoryId" class="form-label fw-bold">Categoría</label>
                    <select th:field="*{categoryId}" class="form-select" required>
                        <option value="" disabled selected>-- Selecciona una categoría --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">Categoría
                        </option>
                    </select>
                </div>
                <div class="col mb-3">
                    <label for="brandId" class="form-label fw-bold">Marca</label>
                    <select th:field="*{brandId}" class="form-select" required>
                        <option value="" disabled>-- Selecciona una marca --</option>
                        <option th:each="brand : ${brands}"
                                th:value="${brand.id}"
                                th:text="${brand.name}">Marca
                        </option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="fw-bold" for="urlImage">URL imagen</label>
                <input type="url" th:field="*{urlImage}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Descripción</label>
                <textarea th:field="*{description}" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Descripción corta</label>
                <input type="text" th:field="*{shortDescription}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Precio</label>
                <input type="number" th:field="*{price}" class="form-control" min="0.0" step="any" required>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Stock</label>
                <input type="number" th:field="*{stock}" class="form-control" min="0" required>
            </div>

            <div id="features-container">
                <label class="fw-bold">Características</label>

                <div th:each="feature : *{features}" class="row mb-2 feature-row">
                    <div class="col-5">
                        <input type="text" name="featureKeys" class="form-control"
                               th:value="${feature.key}" required>
                    </div>
                    <div class="col-5">
                        <input type="text" name="featureValues" class="form-control"
                               th:value="${feature.value}" required>
                    </div>
                    <div class="col-2">
                        <button type="button" class="btn btn-danger w-100"
                                onclick="this.closest('.feature-row').remove()" title="Eliminar fila">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-outline-primary mt-2" onclick="addFeatureRow()">
                <i class="bi bi-plus-circle me-1"></i> Agregar característica
            </button>

            <div class="mt-4">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/admin/products}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </section>
</div>

<th:block class="customJs">
    <script th:src="@{/assets/js/productForm.js}"></script>
</th:block>

</body>
</html>
